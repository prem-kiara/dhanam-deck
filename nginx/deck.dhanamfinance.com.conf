# /etc/nginx/sites-available/deck.dhanamfinance.com
# After enabling this site:  sudo certbot --nginx -d deck.dhanamfinance.com
# certbot rewrites this file to add HTTPS + the 80→443 redirect.

server {
    listen 80;
    listen [::]:80;
    server_name deck.dhanamfinance.com;

    root /home/ubuntu/dhanam-deck;
    index index.html;

    access_log /var/log/nginx/deck.dhanamfinance.com.access.log;
    error_log  /var/log/nginx/deck.dhanamfinance.com.error.log;

    # Don't cache HTML/JSX/CSS so deploys take effect on the next refresh.
    location ~* \.(html|jsx?|css)$ {
        expires off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache photos / fonts aggressively (filenames are stable).
    location ~* \.(png|jpe?g|webp|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript text/javascript application/json text/plain image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }
}
